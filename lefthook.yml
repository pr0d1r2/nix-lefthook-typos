---
output:
  - failure

remotes:
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nixfmt
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shellcheck
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shfmt
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-statix
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-deadnix
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nix-no-embedded-shell
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-bats-parse
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-tdd-order-bats
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-yamllint
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nix-flake-check
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-trailing-whitespace
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-missing-final-newline
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-conflict-markers
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-editorconfig-checker
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-no-local-paths
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-file-size-check
    ref: main
    configs:
      - lefthook-remote.yml

pre-commit:
  parallel: true
  commands:
    typos:
      run: timeout ${LEFTHOOK_TYPOS_TIMEOUT:-30} typos {staged_files}
    markdownlint:
      glob: "*.md"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} markdownlint {staged_files}
    taplo:
      glob: "*.toml"
      run: timeout ${LEFTHOOK_TAPLO_TIMEOUT:-30} taplo format --check {staged_files}

pre-push:
  parallel: true
  commands:
    typos:
      run: timeout ${LEFTHOOK_TYPOS_TIMEOUT:-30} typos {push_files}
    markdownlint:
      glob: "*.md"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} markdownlint {push_files}
    taplo:
      glob: "*.toml"
      run: timeout ${LEFTHOOK_TAPLO_TIMEOUT:-30} taplo format --check {push_files}
